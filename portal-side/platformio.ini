; Portal-side firmware — ESP32-S3-N16R8 acting as USB HOST to a real
; Portal of Power. Console/logs go over the UART-bridge USB-C (the native USB
; is busy being the host), so monitor over UART at 115200.
;
; Build/flash:  pio run -t upload -t monitor
[env:portal-side]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags =
    -I${PROJECT_DIR}/../shared
    ; Onboard WS2812 status LED pin — change if your board uses another GPIO
    ; (ESP32-S3 devkits are usually 48, some boards 38).
    -DSTATUS_LED_GPIO=48
; N16R8 = 16 MB flash + 8 MB octal PSRAM. Adjust if your board differs.
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
