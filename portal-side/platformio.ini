; Portal side (N16R8). USB host to the real portal; forwards every HID report
; verbatim over ESP-NOW (no figure parsing). The console drives all commands;
; this side is a transparent bridge with the write-safety net.
[env:portal-side]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags = -I${PROJECT_DIR}/../shared
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
