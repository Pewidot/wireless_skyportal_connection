; Console-side firmware — T-Dongle-S3 emulating a Portal of Power to the console
; (or, for testing, to the PC where our Python tool talks to it).
;
; The single USB-C is the native USB = TinyUSB device. Console/logs therefore go
; to UART0 (GPIO43/44) — attach a USB-UART adapter there if you need logs.
;
; Flash:  hold BOOT, tap RST, release BOOT (download mode), then: pio run -t upload
[env:console-side]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags =
    -I${PROJECT_DIR}/../shared
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
