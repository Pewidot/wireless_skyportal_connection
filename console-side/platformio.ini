; Console side (T-Dongle). Presents as the (Traptanium) portal and forwards every
; byte to/from the real portal over ESP-NOW. Transparent bridge + ST7735 display.
[env:console-side]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags = -I${PROJECT_DIR}/../shared
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
